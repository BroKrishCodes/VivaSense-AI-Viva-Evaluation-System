<!DOCTYPE html>
<html>
<head>
<title>VivaSense</title>

<style>
body {
    margin:0;
    font-family: 'Segoe UI';
    background: linear-gradient(to right, #2b4c7e, #3b5998);
}

/* Navbar */
.navbar {
    background:#2b4c7e;
    padding:15px;
    display:flex;
    justify-content:space-between;
    color:white;
}

.navbar a {
    color:white;
    margin-left:20px;
    text-decoration:none;
}

/* Card */
.container {
    width:40%;
    margin:80px auto;
    background:#e6e6e6;
    padding:25px;
    border-radius:10px;
    text-align:center;
}

/* Button */
button {
    width:100%;
    padding:12px;
    margin:10px 0;
    background:#2b4c7e;
    color:white;
    border:none;
    border-radius:5px;
}
</style>

</head>

<body>

<div class="navbar">
    <div><b>VivaSense</b></div>
    <div>
        <a href="/">Home</a>
        <a href="/student">Student</a>
        <a href="/examiner">Examiner</a>
        <a href="/records">Records</a>
    </div>
</div>

<div class="container">
    <h2>Welcome to VivaSense</h2>

    <a href="/examiner"><button>Examiner Panel</button></a>
    <a href="/student"><button>Student Panel</button></a>
    <a href="/records"><button>View Records</button></a>
</div>

</body>
</html>
