<!DOCTYPE html>
<html>
<head>
<title>Examiner</title>

<style>
body {
    margin:0;
    font-family: 'Segoe UI';
    background: linear-gradient(to right, #2b4c7e, #3b5998);
}

/* Navbar */
.navbar {
    background:#2b4c7e;
    padding:15px;
    display:flex;
    justify-content:space-between;
    color:white;
}

.navbar a {
    color:white;
    margin-left:20px;
    text-decoration:none;
}

/* CARD */
.container {
    width:700px;
    margin:60px auto;
    background:#e6e6e6;
    padding:40px;
    border-radius:12px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

/* Inputs */
input, textarea {
    width:100%;
    padding:12px;
    margin:12px 0;
    border-radius:6px;
    border:1px solid #ccc;
}

/* Buttons */
button {
    width:100%;
    padding:14px;
    margin-top:10px;
    background:#2b4c7e;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

button:hover {
    background:#1d3557;
}

/* Table */
table {
    width:100%;
    margin-top:25px;
    border-collapse:collapse;
}

th {
    background:#2b4c7e;
    color:white;
    padding:10px;
}

td {
    padding:10px;
    border-bottom:1px solid #ccc;
}

/* Delete Button */
.delete-btn {
    background:red;
}

.delete-btn:hover {
    background:darkred;
}
</style>

</head>

<body>

<div class="navbar">
    <div><b>VivaSense</b></div>
    <div>
        <a href="/">Home</a>
        <a href="/student">Student</a>
        <a href="/examiner">Examiner</a>
        <a href="/records">Records</a>
    </div>
</div>

<div class="container">

<h2>Examiner Panel</h2>

<!-- ADD QUESTION -->
<form method="POST">
    <input type="text" name="test_id" placeholder="Test ID" required>

    <textarea name="question" placeholder="Enter question" required></textarea>

    <textarea name="ideal" placeholder="Ideal answer" required></textarea>

    <input type="number" name="max_marks" placeholder="Marks" required>

    <button>Add Question</button>
</form>

<!-- TEST LIST -->
<h3>All Tests</h3>

<table>
<tr>
    <th>Test ID</th>
    <th>Action</th>
</tr>

{% for t in tests %}
<tr>
    <td>{{ t[0] }}</td>
    <td>
        <a href="/delete_test/{{ t[0] }}" onclick="return confirm('Delete this test?')">
            <button class="delete-btn">Delete</button>
        </a>
    </td>
</tr>
{% endfor %}

</table>

</div>

</body>
</html>
